<!--
  Template HTML du formulaire d'ajout de lot
  - [(ngModel)]="champ" = liaison bidirectionnelle (le champ se met à jour quand on tape)
  - (ngSubmit)="onSubmit()" = quand on soumet le formulaire, appeler la méthode onSubmit()
  - *ngFor = boucle pour afficher la liste des races dans le <select>
-->

<div class="container">
  <h2>Ajouter un lot</h2>

  <!-- Message de succès -->
  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }

  <!-- Message d'erreur -->
  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="onSubmit()">

    <!-- Sélection de la race -->
    <div class="form-group">
      <label for="race">Race</label>
      <select id="race" [(ngModel)]="lot.idRace" name="idRace" required>
        <option [value]="0" disabled>-- Choisir une race --</option>
        @for (race of races; track race.id) {
          <option [value]="race.id">{{ race.nom }}</option>
        }
      </select>
    </div>

    <!-- Quantité -->
    <div class="form-group">
      <label for="quantite">Quantité</label>
      <input type="number" id="quantite" [(ngModel)]="lot.quantite" name="quantite"
             placeholder="Ex: 100" required min="1">
    </div>

    <!-- Date d'enregistrement -->
    <div class="form-group">
      <label for="date">Date d'enregistrement</label>
      <input type="date" id="date" [(ngModel)]="lot.date_enregistrement"
             name="date_enregistrement" required>
    </div>

    <!-- Âge -->
    <div class="form-group">
      <label for="age">Âge (semaines)</label>
      <input type="number" id="age" [(ngModel)]="lot.age" name="age"
             placeholder="Ex: 4" required min="0">
    </div>

    <!-- Prix d'achat -->
    <div class="form-group">
      <label for="pa">Prix d'achat (Ar)</label>
      <input type="number" id="pa" [(ngModel)]="lot.PA" name="PA"
             placeholder="Ex: 15000" required min="0" step="0.01">
    </div>

    <!-- Bouton soumettre -->
    <button type="submit">Ajouter</button>
  </form>

    <button><a routerLink="/oeuf-eclot">Eclore des oeufs</a></button>
    <button><a routerLink="/resenser-oeuf">Resenser les oeufs</a></button>
</div>
