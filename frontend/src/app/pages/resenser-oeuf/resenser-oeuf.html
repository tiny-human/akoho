<div class="container">
  <h2>Resenser les oeufs</h2>

  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label for="lot">Lot</label>
      <select id="lot" [(ngModel)]="oeuf.idLot" name="idLot" required>
        <option [value]="0" disabled>-- Choisir un lot --</option>
        @for (lot of lots; track lot.id) {
          <option [value]="lot.id">Lot #{{ lot.id }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="quantite">Quantité</label>
      <input type="number" id="quantite" [(ngModel)]="oeuf.quantite" name="quantite"
             placeholder="Ex: 100" required min="1">
    </div>

    <div class="form-group">
      <label for="date">Date d'enregistrement</label>
      <input type="date" id="date" [(ngModel)]="oeuf.date_ponte"
             name="date_ponte" required>
    </div>

    <button type="submit">Ajouter</button>
    <button><a routerLink="/ajouter-lot">Ajouter un lot</a></button>
    <button><a routerLink="/oeuf-eclot">Eclore des oeufs</a></button>
    <button><a routerLink="/ajouter-mort">Ajouter des morts</a></button>
  </form>
</div>
