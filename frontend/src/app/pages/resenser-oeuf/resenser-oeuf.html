<div class="page-container">

  <nav class="nav-bar">
    <a routerLink="/dashboard" class="nav-link">Dashboard</a>
    <a routerLink="/ajouter-lot" class="nav-link">Ajouter lot</a>
    <a routerLink="/resenser-oeuf" class="nav-link active">Recenser œufs</a>
    <a routerLink="/oeuf-eclot" class="nav-link">Éclosion</a>
    <a routerLink="/ajouter-mort" class="nav-link">Morts</a>
  </nav>

  <div class="form-card">
    <h2>Recenser les œufs</h2>

    @if (successMessage) {
      <div class="alert success">{{ successMessage }}</div>
    }
    @if (errorMessage) {
      <div class="alert error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="lot">Lot</label>
        <select id="lot" [(ngModel)]="oeuf.idLot" name="idLot" required>
          <option [value]="0" disabled>-- Choisir un lot --</option>
          @for (lot of lots; track lot.id) {
            <option [value]="lot.id">Lot #{{ lot.id }} — {{ lot.quantite }} têtes ({{ lot.date_enregistrement }})</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="quantite">Quantité</label>
        <input type="number" id="quantite" [(ngModel)]="oeuf.quantite" name="quantite"
               placeholder="Ex: 100" required min="1">
      </div>

      <div class="form-group">
        <label for="date">Date d'enregistrement</label>
        <input type="date" id="date" [(ngModel)]="oeuf.date_ponte"
               name="date_ponte" required>
      </div>

      <button type="submit" class="btn-primary">Ajouter</button>
    </form>
  </div>
</div>
