<div class="page-container">

  <nav class="nav-bar">
    <a routerLink="/dashboard" class="nav-link">Dashboard</a>
    <a routerLink="/ajouter-lot" class="nav-link">Ajouter lot</a>
    <a routerLink="/resenser-oeuf" class="nav-link">Recenser œufs</a>
    <a routerLink="/oeuf-eclot" class="nav-link">Éclosion</a>
    <a routerLink="/ajouter-mort" class="nav-link active">Morts</a>
  </nav>

  <div class="form-card">
    <h2>Enregistrer des morts</h2>

    @if (successMessage) {
      <div class="alert success">{{ successMessage }}</div>
    }
    @if (errorMessage) {
      <div class="alert error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="lot">Lot</label>
        <select id="lot" [(ngModel)]="lotMort.idLot" name="idLot" required>
          <option [value]="0" disabled>-- Choisir un lot --</option>
          @for (lot of lots; track lot.id) {
            <option [value]="lot.id">Lot #{{ lot.id }} </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="quantite">Quantité</label>
        <input type="number" id="quantite" [(ngModel)]="lotMort.quantite" name="quantite"
               placeholder="Ex: 5" required min="1">
      </div>

      <div class="form-group">
        <label for="date">Date d'enregistrement</label>
        <input type="date" id="date" [(ngModel)]="lotMort.date_enregistrement"
               name="date_enregistrement" required>
      </div>

      <button type="submit" class="btn-primary">Ajouter</button>
    </form>
  </div>
</div>
